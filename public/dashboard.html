<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="bg-particles" id="particles"></div>

    <main class="dashboard-container">
        <div class="dashboard-card">
            <div class="dashboard-header">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </svg>
                </div>
                <h1>¡Acceso Concedido!</h1>
                <p class="welcome-text">Bienvenido, <strong id="userName">...</strong></p>
            </div>

            <div class="dashboard-content">
                <div class="info-card">
                    <div class="info-icon">📊</div>
                    <div>
                        <h3>Panel de Administración</h3>
                        <p>Has iniciado sesión exitosamente en el sistema.</p>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-icon">🕐</div>
                    <div>
                        <h3>Sesión Activa</h3>
                        <p id="sessionTime">Conectado desde: ...</p>
                    </div>
                </div>

                <div class="info-card">
                    <div class="info-icon">🔐</div>
                    <div>
                        <h3>Seguridad</h3>
                        <p>Tu sesión está protegida y cifrada.</p>
                    </div>
                </div>
            </div>

            <button class="btn-logout" id="btnLogout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" width="18" height="18">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Cerrar Sesión
            </button>
        </div>
    </main>

    <script>
        // Partículas
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (4 + Math.random() * 4) + 's';
            const size = 2 + Math.random() * 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particlesContainer.appendChild(particle);
        }

        // Cargar datos del usuario
        fetch('/api/user')
            .then(res => {
                if (!res.ok) { window.location.href = '/'; return; }
                return res.json();
            })
            .then(data => {
                if (data) {
                    document.getElementById('userName').textContent = data.usuario;
                }
            })
            .catch(() => window.location.href = '/');

        // Hora de conexión
        const now = new Date();
        document.getElementById('sessionTime').textContent =
            `Conectado desde: ${now.toLocaleDateString('es-MX')} ${now.toLocaleTimeString('es-MX')}`;

        // Logout
        document.getElementById('btnLogout').addEventListener('click', async () => {
            await fetch('/logout', { method: 'POST' });
            window.location.href = '/';
        });
    </script>
</body>

</html>
