<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulario de inicio de sesión seguro">
  <title>Inicio de Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-particles" id="particles"></div>

  <main class="login-container">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1"/>
          </svg>
        </div>
        <h1>Iniciar Sesión</h1>
        <p class="subtitle">Ingresa tus credenciales para acceder</p>
      </div>

      <!-- Formulario -->
      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <label for="usuario">Usuario</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>
          </div>
        </div>

        <div class="input-group">
          <label for="contrasena">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required>
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Mensaje de error/éxito -->
        <div class="message-container" id="messageContainer"></div>

        <button type="submit" class="btn-login" id="btnLogin">
          <span class="btn-text">Acceder</span>
          <div class="btn-loader" style="display:none">
            <div class="spinner"></div>
          </div>
        </button>
      </form>

      <div class="login-footer">
        <p>🔒 Conexión segura</p>
      </div>
    </div>
  </main>

  <script>
    // ── Partículas de fondo ──────────────────────────────────────────
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 6 + 's';
      particle.style.animationDuration = (4 + Math.random() * 4) + 's';
      const size = 2 + Math.random() * 4;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particlesContainer.appendChild(particle);
    }

    // ── Toggle contraseña ────────────────────────────────────────────
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('contrasena');
    const eyeOpen = toggleBtn.querySelector('.eye-open');
    const eyeClosed = toggleBtn.querySelector('.eye-closed');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.style.display = isPassword ? 'none' : 'block';
      eyeClosed.style.display = isPassword ? 'block' : 'none';
    });

    // ── Formulario de login ──────────────────────────────────────────
    const form = document.getElementById('loginForm');
    const messageContainer = document.getElementById('messageContainer');
    const btnLogin = document.getElementById('btnLogin');
    const btnText = btnLogin.querySelector('.btn-text');
    const btnLoader = btnLogin.querySelector('.btn-loader');

    function showMessage(text, type) {
      messageContainer.innerHTML = `<div class="message ${type}">${text}</div>`;
      messageContainer.querySelector('.message').classList.add('show');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Mostrar loading
      btnText.style.display = 'none';
      btnLoader.style.display = 'flex';
      btnLogin.disabled = true;
      messageContainer.innerHTML = '';

      const usuario = document.getElementById('usuario').value.trim();
      const contrasena = document.getElementById('contrasena').value;

      try {
        const response = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, contrasena })
        });

        const data = await response.json();

        if (data.success) {
          showMessage(data.message, 'success');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1200);
        } else {
          showMessage(data.message, 'error');
          // Shake animation
          const card = document.querySelector('.login-card');
          card.classList.add('shake');
          setTimeout(() => card.classList.remove('shake'), 500);
        }
      } catch (err) {
        showMessage('Error de conexión. Intenta de nuevo.', 'error');
      } finally {
        btnText.style.display = 'inline';
        btnLoader.style.display = 'none';
        btnLogin.disabled = false;
      }
    });
  </script>
</body>
</html>
